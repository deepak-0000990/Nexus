<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Feedback Form</h2>
    <label for="fname">Full Name</label>
    <input type="text" id="fname">
    <br>
    <br>
    <label for="email">Email</label>
    <input type="email" id="email">
    <br>
    <br>
    <label for="Rate Us">Rate Us:</label>
    <input type="radio" name="Rate Us" value="1star">
    <label for="star">1 Star</label>
    <input type="radio" name="Rate Us" value="2star">
    <label for="star">2 Star</label>
    <input type="radio" name="Rate Us" value="3star">
    <label for="star">3 Star</label>
    <input type="radio" name="Rate Us" value="4star">
    <label for="star">4 Star</label>
    <input type="radio" name="Rate Us" value="5star">
    <label for="star">5 Star</label>
    <br>
    <br>
    <label for="comments">Comments</label>
    <textarea name="msg" id="msg" rows="15" cols="45"></textarea>
    <br>
    <br>
    <button>Submit Feedback</button>
</body>
</html>
