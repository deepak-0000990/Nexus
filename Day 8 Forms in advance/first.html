<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <fieldset>
        <legend>IIT Registration Form</legend>
    <label for="fname">Full Name</label>
    <input type="text" id="fname" name="fname">

    <br><br>
    <label for="email">Email</label>
    <input type="email" id="email" name="email">

    <br><br>

    <label for="phone">Phone</label>
    <input type="number" id="phone" name="phone">

    <br><br>

    <label for="password">Password</label>
    <input type="text" id="password">


    <br><br>
    <label for="">Gender:</label>

    <label for="Male">Male</label>
    <input type="radio">
    <label for="female">Female</label>
    <input type="radio" id="female" name="Gender" value="female">
    
    <label for="other">Other</label>
    <input type="radio" id="other" name="Gender" value="other">

    <br><br>

    <label for="DOB">Date of Birth</label>
    <input type="date" id="DOB" name="DOB" min="2001-01-01" max="2005-12-31">

    <br>
    <br>
    <label for="school">School Name:</label>
    <input type="text" id="school" name="School">

    <br><br>
    <label for="Board">Board:</label>
    <select name="Board" id="Board">
        <option value="" disabled selected>Select Your Board</option>
        <option value="State">State</option>
        <option value="Central">Centeral</option>
    </select>

    <br><br>
    <label for="Year">Year of Passing:</label>
    <input type="number" id="Year" name="Year" min="2023" max="2027">

    <br><br>
    <label for="center">Exam Center:</label>
    <select name="Center" id="center">
        <option value="" disabled selected>Select Your center</option>
        <option value="Delhi">Delhi</option>
        <option value="Goa">Goa</option>
        <option value="Mumbai">Mumbai</option>
        <option value="Berhmpur">Berhmpur</option>
        <option value="Bhubaneswar">Bhubaneswar</option>
    </select>

    <br><br>
    <button>Register</button>

</fieldset>
</body>
</html>
